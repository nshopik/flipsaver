name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch: # build-only dry run; release steps need a tag

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + tags so build.rs can resolve the version tag
          # via `git describe --tags --exact-match`.
          fetch-depth: 0

      - name: Install toolchain deps
        run: sudo apt-get update && sudo apt-get install -y clang lld llvm

      - name: Add Rust target
        run: rustup target add x86_64-pc-windows-msvc

      - name: Install cargo-xwin
        run: cargo install cargo-xwin --locked

      - name: Build
        env:
          XWIN_ACCEPT_LICENSE: "1"
        run: cargo xwin build --release --target x86_64-pc-windows-msvc

      - name: Package
        run: cp target/x86_64-pc-windows-msvc/release/flipsaver.exe flipsaver.scr

      # Release notes come from the CHANGELOG.md section matching the tag,
      # not from commit messages, so tagging from CLI or web UI both
      # produce curated notes.
      - name: Extract changelog section
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          ver="${GITHUB_REF_NAME#v}"
          awk -v ver="$ver" '
            /^## \[/ { p = index($0, "[" ver "]") > 0; next }
            p' CHANGELOG.md > release-notes.md
          test -s release-notes.md || { echo "No [$ver] section in CHANGELOG.md" >&2; exit 1; }

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "$GITHUB_REF_NAME" flipsaver.scr
          --title "$GITHUB_REF_NAME" --notes-file release-notes.md
